name: Sync upstream
on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set upstream and sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/NousResearch/hermes-agent.git || true
          git fetch upstream main
          git checkout -b upstream upstream/main 2>/dev/null || git checkout upstream
          git merge upstream/main --ff-only || true
          git push origin upstream --force
